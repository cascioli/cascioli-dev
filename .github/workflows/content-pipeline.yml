name: Publish Social Content

on:
  schedule:
    - cron: '0 8 * * 1'   # Monday 08:00 UTC
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Wait for Vercel production deployment
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID:    ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          TIMEOUT=600
          INTERVAL=15
          ELAPSED=0
          TEAM_PARAM=""
          [ -n "$VERCEL_TEAM_ID" ] && TEAM_PARAM="&teamId=$VERCEL_TEAM_ID"

          echo "Polling Vercel for production readiness..."
          while [ $ELAPSED -lt $TIMEOUT ]; do
            RESPONSE=$(curl -sf \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/deployments?target=production&limit=1${TEAM_PARAM}")

            STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].readyState // empty')

            if [ "$STATE" = "READY" ]; then
              echo "Deployment READY."
              exit 0
            elif [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "Deployment failed: $STATE"
              exit 1
            else
              echo "State: ${STATE:-unknown} — ${ELAPSED}s elapsed, retrying in ${INTERVAL}s..."
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            fi
          done

          echo "Timeout: deployment not READY after ${TIMEOUT}s"
          exit 1

      - name: Run publishing script
        run: npx tsx src/scripts/publish-social.ts
        env:
          API_SECRET:             ${{ secrets.API_SECRET }}
          TWITTER_API_KEY:        ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:     ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:   ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET:  ${{ secrets.TWITTER_ACCESS_SECRET }}
          LINKEDIN_ACCESS_TOKEN:  ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:    ${{ secrets.LINKEDIN_PERSON_URN }}

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(social): update published log [skip ci]'
          file_pattern: social_published_log.json
